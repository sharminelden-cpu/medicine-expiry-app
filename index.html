<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medicine Expiry Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Medicine Expiry Tracker</h1>

    <div class="medicine-card">
      <h2>Paracetamol 500mg</h2>
      <p>Batch: <strong>PCM-2024-001</strong></p>
      <p>Quantity: <strong>100 tablets</strong></p>
      <p>Expiry: <strong>2025-08-15</strong></p>
      <span class="badge safe">Safe</span>
    </div>

    <div class="medicine-card">
      <h2>Amoxicillin 250mg</h2>
      <p>Batch: <strong>AMX-2024-042</strong></p>
      <p>Quantity: <strong>50 capsules</strong></p>
      <p>Expiry: <strong>2026-07-10</strong></p>
      <span class="badge expiring">Expiring Soon</span>
    </div>

    <div class="medicine-card">
      <h2>Ibuprofen 400mg</h2>
      <p>Batch: <strong>IBU-2023-089</strong></p>
      <p>Quantity: <strong>30 tablets</strong></p>
      <p>Expiry: <strong>2025-01-01</strong></p>
      <span class="badge expired">Expired</span>
    </div>

  </body>
</html>
